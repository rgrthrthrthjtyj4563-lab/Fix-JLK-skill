display_name: JLK Patient Template Report
short_description: 生成贴近真实模板的患者问卷分析 Word 报告
default_prompt: >-
  根据患者问卷数据生成严格继承模板底稿的 Word 分析报告。

  一、结构要求
  - 正文内容只能填充模板定义的可变文字，不得改写为旧的"引言/数据信息分析/反馈意见分析/综合分析与建议"体系，不得参考 04_outputs 中旧风格样本。
  - 必须按 parse_questionnaire -> cluster_dimensions -> build_payload -> render_from_template 链路执行。
  - 模板分类、4.x 标题、4.x 引言、4.x 小标题、5.1 重点题目选择和图表点位只能由程序规则决定，AI 草稿无权覆盖。

  二、front matter 必填字段
  - product: 品种名
  - region: 地区名
  - survey_period: 调研时间段（如 2025年03月01日——2025年03月31日）
  - key_issue_question_refs: JSON 数组字符串，恰好 2 个题号，如 '["q02", "q05"]'。题号必须存在于问卷并已进入实际 4.x 章节。
  - theme 或 主题: 如提供固定维度主题名，必须精确命中 data/dimension_library.json 中 theme_name 字段。

  三、正文章节（必须全部由 AI 生成）
  1. ## 前言：2 段，约 400 字，顺序：疾病/品类背景 → 产品价值 → 区域与对象 → 调研目的 → 应用价值。
  2. ## 项目背景：2 段，第1段宏观背景/区域特征，第2段数据缺口/调研必要性。
  3. ## 项目开展情况：程序生成，AI 可选覆盖。
  4. ## 问卷说明：程序生成，AI 可选覆盖。
  5. ## 问卷结果分析：
     - 导语段：程序自动拼接维度名称与数量。
     - 每个 4.x 维度下，每道题一个小标题 + 统计表 + AI 分析正文（1 段，250-300 字，必须含数字百分比，禁止 A/B/C/D 字母选项列举）。
  6. ## 调研结果
     - ### 5.1 问卷重点问题分析：2 段，每段 250-350 字，顺序与 key_issue_question_refs 一致。
     - ### 5.2 调研结果总结：3-5 段，总字数不超过 700 字，必须点名品种或地区。
     - ### 5.3 建议：1 段导语（50-80 字）+ 2-4 条阿拉伯数字编号建议。

  四、禁止事项
  - 5.2 标题必须为"5.2 调研结果总结"。
  - 禁止让程序代写 4.x 分析正文、5.1 正文、5.2 正文、5.3 正文——如 AI 正文缺失或不合格，pipeline 将直接报错而非兜底。
  - 禁止在 4.x 分析正文中使用 A/B/C/D、选项A/选项B 等字母选项列举。
  - 禁止使用"呈现出较明确的反馈集中趋势""该环节已经成为影响""更适合作为后续患者教育和随访沟通的重点切入点"等程序化固定句式。

  五、两阶段模式
  - 如果一次生成超时，可以先生成 report_content.md 并保存，然后单独运行 pipeline 渲染 Word。
  - 每次运行都会执行 preflight 检查草稿完整性（关键字段、章节、正文是否存在），preflight 失败时输出 PREFLIGHT_FAILED 及具体错误列表。
  - AI 可以基于 preflight 错误信息修改草稿后重新运行，无需重写整份报告。

  六、草稿模板
  - 参考 references/report-content-template.md 了解标准草稿结构。按此模板填充可最大程度减少结构错误。
